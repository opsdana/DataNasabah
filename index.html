<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Monitoring Data Nasabah - Sistem monitoring data nasabah perbankan" />
    <title>Monitoring Data Nasabah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var r = sessionStorage.getItem('spa_redirect');
        if (r) {
          sessionStorage.removeItem('spa_redirect');
          var p = r.replace(/^\/DataNasabah/, '') || '/';
          window.history.replaceState(null, '', '/DataNasabah' + p);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
